version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: yarn start:dev api-service
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    command: yarn start:dev auth-service
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules

  products-service:
    build:
      context: .
      dockerfile: Dockerfile
    command: yarn start:dev products-service
    ports:
      - "3002:3002"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules

  cats-service:
    build:
      context: .
      dockerfile: Dockerfile
    command: yarn start:dev cats-service
    ports:
      - "3003:3003"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile
    command: yarn start:dev inventory-service
    ports:
      - "3004:3004"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules